<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Sandbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: oklch(0.10 0.000 0);
      color: oklch(0.92 0.005 145);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid oklch(0.22 0.005 145);
      background: oklch(0.13 0.005 145);
      flex-shrink: 0;
    }
    .title { font-size: 0.85rem; font-weight: 600; color: oklch(0.65 0.15 145); flex: 1; }
    .run-btn {
      background: oklch(0.65 0.15 145);
      color: oklch(0.10 0 0);
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }
    .run-btn:hover { background: oklch(0.70 0.16 145); }
    .clear-btn {
      background: oklch(0.18 0.005 145);
      border: 1px solid oklch(0.25 0.005 145);
      border-radius: 6px;
      color: oklch(0.92 0.005 145);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 6px 12px;
      cursor: pointer;
    }
    .kbd {
      font-size: 0.65rem;
      color: oklch(0.50 0.008 145);
      background: oklch(0.16 0.005 145);
      border: 1px solid oklch(0.25 0.005 145);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: oklch(0.20 0.005 145);
    }
    .pane {
      background: oklch(0.10 0 0);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-label {
      font-size: 0.65rem;
      color: oklch(0.50 0.008 145);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 14px;
      border-bottom: 1px solid oklch(0.16 0.005 145);
      flex-shrink: 0;
    }
    #editor {
      flex: 1;
      width: 100%;
      background: oklch(0.12 0.005 145);
      border: none;
      color: oklch(0.92 0.005 145);
      font-family: inherit;
      font-size: 0.85rem;
      line-height: 1.6;
      padding: 14px;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    #output {
      flex: 1;
      padding: 14px;
      overflow: auto;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .log-line { display: flex; gap: 10px; padding: 2px 0; border-bottom: 1px solid oklch(0.14 0.005 145); }
    .log-line:last-child { border-bottom: none; }
    .log-arrow { color: oklch(0.40 0.008 145); flex-shrink: 0; }
    .log-val { color: oklch(0.85 0.010 145); word-break: break-all; }
    .log-error .log-val { color: oklch(0.72 0.18 25); }
    .log-return .log-val { color: oklch(0.72 0.18 55); }
    .log-info .log-val { color: oklch(0.65 0.15 145); }
    .empty-hint { color: oklch(0.38 0.006 145); font-size: 0.78rem; padding-top: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">JS Sandbox</span>
    <span class="kbd">Ctrl+Enter</span>
    <button class="clear-btn" id="clear-btn">Clear</button>
    <button class="run-btn" id="run-btn">▶ Run</button>
  </div>

  <div class="main">
    <div class="pane">
      <div class="pane-label">Code</div>
      <textarea id="editor" spellcheck="false" placeholder="// Type JavaScript here…&#10;console.log('Hello, Toolsx!')&#10;&#10;const arr = [1, 2, 3]&#10;arr.map(x => x * 2)">// Type JavaScript here…

const greet = (name) => `Hello, ${name}!`
console.log(greet('Toolsx'))

// Expressions are auto-returned
[1, 2, 3].map(x => x ** 2)</textarea>
    </div>
    <div class="pane">
      <div class="pane-label">Output</div>
      <div id="output"><span class="empty-hint">Press ▶ Run or Ctrl+Enter to execute</span></div>
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');
    const runBtn = document.getElementById('run-btn');
    const clearBtn = document.getElementById('clear-btn');

    function serialize(val) {
      if (val === undefined) return 'undefined';
      if (val === null) return 'null';
      if (typeof val === 'function') return val.toString().slice(0, 80) + (val.toString().length > 80 ? '…' : '');
      try { return JSON.stringify(val, null, 2); } catch { return String(val); }
    }

    function addLine(type, arrow, val) {
      const line = document.createElement('div');
      line.className = `log-line log-${type}`;
      line.innerHTML = `<span class="log-arrow">${arrow}</span><span class="log-val"><pre style="margin:0;font-family:inherit;white-space:pre-wrap">${serialize(val)}</pre></span>`;
      output.appendChild(line);
    }

    function run() {
      output.innerHTML = '';
      const code = editor.value;

      // Intercept console
      const origLog = console.log;
      const origWarn = console.warn;
      const origError = console.error;
      const origInfo = console.info;

      console.log = (...args) => { args.forEach(a => addLine('log', '›', a)); origLog(...args); };
      console.warn = (...args) => { args.forEach(a => addLine('warn', '⚠', a)); origWarn(...args); };
      console.error = (...args) => { args.forEach(a => addLine('error', '✕', a)); origError(...args); };
      console.info = (...args) => { args.forEach(a => addLine('info', 'ℹ', a)); origInfo(...args); };

      try {
        const result = eval(code);
        if (result !== undefined) addLine('return', '←', result);
      } catch (e) {
        addLine('error', '✕', e.message);
      } finally {
        console.log = origLog;
        console.warn = origWarn;
        console.error = origError;
        console.info = origInfo;
      }

      if (!output.children.length) {
        output.innerHTML = '<span class="empty-hint">No output</span>';
      }
    }

    runBtn.addEventListener('click', run);
    clearBtn.addEventListener('click', () => { output.innerHTML = '<span class="empty-hint">Cleared.</span>'; });

    editor.addEventListener('keydown', (e) => {
      // Tab → 2 spaces
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart;
        editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = s + 2;
      }
      // Ctrl+Enter → run
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        run();
      }
    });

    // Run on load
    run();
  </script>
</body>
</html>

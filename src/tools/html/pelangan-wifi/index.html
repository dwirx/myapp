<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelangan Wifi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f0a;
      --surface: #111811;
      --surface-2: #172217;
      --border: #1e2d1e;
      --border-2: #2a3d2a;
      --green: #4ade80;
      --green-dim: #16a34a;
      --amber: #fb923c;
      --red: #f87171;
      --ink: #e8f5e8;
      --muted: #6b8f6b;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--green-dim), var(--green));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header-title { font-size: 1rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
    .header-sub { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
    .scan-btn {
      background: var(--green);
      color: #0a0f0a;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .scan-btn:hover { background: #86efac; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Layout ── */
    .main {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: var(--border);
    }

    /* ── Sidebar: Device List ── */
    .sidebar {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .device-count {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      font-size: 0.65rem;
      padding: 2px 8px;
      color: var(--green);
      font-family: var(--mono);
    }
    .search-box {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      color: var(--ink);
      font-size: 0.82rem;
      padding: 7px 12px;
      outline: none;
    }
    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--muted); }
    .device-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .device-item {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .device-item:hover { background: var(--surface-2); border-color: var(--border-2); }
    .device-item.active { background: rgba(74,222,128,0.07); border-color: rgba(74,222,128,0.25); }
    .device-signal {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .signal-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--border-2);
    }
    .signal-bar.active { background: var(--green); }
    .signal-bar.amber { background: var(--amber); }
    .signal-bar.red { background: var(--red); }
    .device-info { flex: 1; min-width: 0; }
    .device-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-meta { font-size: 0.7rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
    .device-status {
      font-size: 0.62rem;
      font-weight: 700;
      font-family: var(--mono);
      padding: 2px 7px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .status-connected { background: rgba(74,222,128,0.12); color: var(--green); }
    .status-idle { background: rgba(107,143,107,0.12); color: var(--muted); }
    .status-blocked { background: rgba(248,113,113,0.12); color: var(--red); }

    /* ── Detail Panel ── */
    .detail {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
    }
    .detail-empty-icon { font-size: 3rem; opacity: 0.3; }
    .detail-empty-text { font-size: 0.85rem; }

    .detail-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .detail-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .detail-device-name { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.03em; }
    .detail-device-ip { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .detail-actions { display: flex; gap: 8px; }
    .action-btn {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      color: var(--ink);
      font-size: 0.75rem;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .action-btn:hover { border-color: var(--green); color: var(--green); }
    .action-btn.danger { color: var(--red); }
    .action-btn.danger:hover { border-color: var(--red); background: rgba(248,113,113,0.06); }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .card-body { padding: 16px; }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-family: var(--mono); font-size: 0.95rem; font-weight: 600; color: var(--ink); }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.red { color: var(--red); }

    /* Signal meter */
    .signal-meter { display: flex; flex-direction: column; gap: 8px; }
    .meter-row { display: flex; align-items: center; gap: 10px; }
    .meter-label { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); min-width: 55px; }
    .meter-bar { flex: 1; height: 6px; background: var(--border-2); border-radius: 3px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .meter-value { font-size: 0.72rem; font-family: var(--mono); color: var(--ink); min-width: 45px; text-align: right; }

    /* Usage chart */
    .usage-chart { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
    .bar-col { flex: 1; background: rgba(74,222,128,0.08); border-radius: 3px 3px 0 0; transition: height 0.3s ease; min-height: 4px; border-top: 1px solid rgba(74,222,128,0.3); }

    /* Speed */
    .speed-display {
      display: flex;
      gap: 16px;
    }
    .speed-block {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .speed-icon { font-size: 1.1rem; margin-bottom: 6px; }
    .speed-val { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; }
    .speed-unit { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📡</div>
      <div>
        <div class="header-title">Pelangan Wifi</div>
        <div class="header-sub">Network Device Manager</div>
      </div>
    </div>
    <button class="scan-btn" id="scan-btn" onclick="startScan()">
      <span id="scan-icon">⟳</span> Scan Network
    </button>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        Devices <span class="device-count" id="dev-count">0</span>
      </div>
      <div class="search-box">
        <input class="search-input" type="search" placeholder="Search device or IP…" id="search" oninput="filterDevices()" />
      </div>
      <div class="device-list" id="device-list"></div>
    </div>

    <!-- Detail Panel -->
    <div class="detail" id="detail">
      <div class="detail-empty" id="detail-empty">
        <div class="detail-empty-icon">📡</div>
        <div class="detail-empty-text">Select a device to view details</div>
      </div>
      <div class="detail-content" id="detail-content" style="display:none"></div>
    </div>
  </div>

  <script>
    // ── Simulated network devices (realistic demo data) ──────────────
    const generateDevices = () => [
      { id: 1, name: "Router Indihome", mac: "A4:5D:36:8B:2C:11", ip: "192.168.1.1", type: "router", vendor: "ZTE", signal: 100, status: "connected", dl: 0, ul: 0, uptime: "14d 6h", ping: 1 },
      { id: 2, name: "HP Laptop Kerja", mac: "B8:2A:72:C4:9D:33", ip: "192.168.1.12", type: "laptop", vendor: "HP", signal: 87, status: "connected", dl: 12.4, ul: 2.1, uptime: "3h 22m", ping: 8 },
      { id: 3, name: "iPhone 15 Pro", mac: "F0:18:98:3E:A1:55", ip: "192.168.1.15", type: "phone", vendor: "Apple", signal: 72, status: "connected", dl: 4.8, ul: 0.9, uptime: "8h 14m", ping: 12 },
      { id: 4, name: "Samsung TV 55\"", mac: "CC:32:E5:7F:B0:22", ip: "192.168.1.20", type: "tv", vendor: "Samsung", signal: 58, status: "idle", dl: 0.2, ul: 0.01, uptime: "2d 1h", ping: 22 },
      { id: 5, name: "Xiaomi Redmi Note", mac: "28:6C:07:A3:D2:88", ip: "192.168.1.23", type: "phone", vendor: "Xiaomi", signal: 45, status: "connected", dl: 1.2, ul: 0.3, uptime: "1h 5m", ping: 28 },
      { id: 6, name: "Smart AC Daikin", mac: "4C:EB:42:1A:9C:F6", ip: "192.168.1.31", type: "iot", vendor: "Daikin", signal: 62, status: "idle", dl: 0.01, ul: 0.01, uptime: "5d 12h", ping: 18 },
      { id: 7, name: "CCTV Outdoor", mac: "D8:C7:71:B4:3E:09", ip: "192.168.1.45", type: "camera", vendor: "Hikvision", signal: 33, status: "connected", dl: 0.5, ul: 8.2, uptime: "12d 3h", ping: 45 },
      { id: 8, name: "Unknown Device", mac: "00:1A:2B:3C:4D:5E", ip: "192.168.1.99", type: "unknown", vendor: "Unknown", signal: 21, status: "blocked", dl: 0, ul: 0, uptime: "0m", ping: 999 },
    ];

    let allDevices = [];
    let selected = null;
    let liveInterval = null;

    const TYPE_ICON = { router: "🌐", laptop: "💻", phone: "📱", tv: "📺", iot: "🔌", camera: "📷", unknown: "❓" };

    function signalColor(s) {
      if (s >= 70) return "active";
      if (s >= 40) return "amber";
      return "red";
    }
    function signalBars(s) {
      const col = signalColor(s);
      const levels = [25, 50, 75, 100];
      return levels.map((l, i) => {
        const h = 6 + i * 4;
        const on = s >= l;
        return `<div class="signal-bar ${on ? col : ''}" style="height:${h}px"></div>`;
      }).join("");
    }

    function renderList() {
      const q = document.getElementById("search").value.toLowerCase();
      const filtered = allDevices.filter(d =>
        d.name.toLowerCase().includes(q) || d.ip.includes(q) || d.mac.toLowerCase().includes(q)
      );
      document.getElementById("dev-count").textContent = filtered.length;
      document.getElementById("device-list").innerHTML = filtered.map(d => `
        <div class="device-item ${selected?.id === d.id ? "active" : ""}" onclick="selectDevice(${d.id})">
          <div class="device-signal">${signalBars(d.signal)}</div>
          <div class="device-info">
            <div class="device-name">${TYPE_ICON[d.type] || "❓"} ${d.name}</div>
            <div class="device-meta">${d.ip} · ${d.signal}dBm</div>
          </div>
          <span class="device-status status-${d.status}">${d.status}</span>
        </div>
      `).join("");
    }

    function filterDevices() { renderList(); }

    function selectDevice(id) {
      selected = allDevices.find(d => d.id === id);
      renderList();
      renderDetail();
    }

    function meterColor(s) {
      if (s >= 70) return "#4ade80";
      if (s >= 40) return "#fb923c";
      return "#f87171";
    }

    function renderDetail() {
      if (!selected) return;
      const d = selected;
      document.getElementById("detail-empty").style.display = "none";
      document.getElementById("detail-content").style.display = "flex";

      const hist = Array.from({ length: 20 }, (_, i) =>
        Math.max(5, Math.min(100, d.dl * 10 * (0.5 + Math.random())))
      );
      const maxH = Math.max(...hist);

      document.getElementById("detail-content").innerHTML = `
        <div class="detail-top">
          <div>
            <div class="detail-device-name">${TYPE_ICON[d.type] || "❓"} ${d.name}</div>
            <div class="detail-device-ip">${d.ip} · ${d.mac}</div>
          </div>
          <div class="detail-actions">
            <button class="action-btn" onclick="pingDevice(${d.id})">🏓 Ping</button>
            <button class="action-btn" onclick="kickDevice(${d.id})">↩ Kick</button>
            <button class="action-btn danger" onclick="blockDevice(${d.id})">🚫 Block</button>
          </div>
        </div>

        <!-- Stats -->
        <div class="card">
          <div class="card-header">Device Info</div>
          <div class="card-body">
            <div class="stat-grid">
              <div class="stat"><div class="stat-label">Vendor</div><div class="stat-value">${d.vendor}</div></div>
              <div class="stat"><div class="stat-label">Status</div><div class="stat-value ${d.status === 'connected' ? 'green' : d.status === 'blocked' ? 'red' : ''}">${d.status}</div></div>
              <div class="stat"><div class="stat-label">Uptime</div><div class="stat-value">${d.uptime}</div></div>
              <div class="stat"><div class="stat-label">Ping</div><div class="stat-value ${d.ping < 20 ? 'green' : d.ping < 60 ? 'amber' : 'red'}">${d.ping}ms</div></div>
            </div>
          </div>
        </div>

        <!-- Signal -->
        <div class="card">
          <div class="card-header">Signal Quality</div>
          <div class="card-body">
            <div class="signal-meter">
              <div class="meter-row">
                <div class="meter-label">Signal</div>
                <div class="meter-bar"><div class="meter-fill" style="width:${d.signal}%;background:${meterColor(d.signal)}"></div></div>
                <div class="meter-value">${d.signal}%</div>
              </div>
              <div class="meter-row">
                <div class="meter-label">Quality</div>
                <div class="meter-bar"><div class="meter-fill" style="width:${Math.min(100,d.signal+10)}%;background:${meterColor(d.signal)}"></div></div>
                <div class="meter-value">${d.signal > 70 ? 'Good' : d.signal > 40 ? 'Fair' : 'Poor'}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Speed -->
        <div class="card">
          <div class="card-header">Bandwidth</div>
          <div class="card-body">
            <div class="speed-display">
              <div class="speed-block">
                <div class="speed-icon">⬇</div>
                <div class="speed-val" style="color:#4ade80" id="dl-val">${d.dl.toFixed(1)}</div>
                <div class="speed-unit">Mbps Down</div>
              </div>
              <div class="speed-block">
                <div class="speed-icon">⬆</div>
                <div class="speed-val" style="color:#60a5fa" id="ul-val">${d.ul.toFixed(1)}</div>
                <div class="speed-unit">Mbps Up</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Usage history -->
        <div class="card">
          <div class="card-header">Traffic History (last 20s)</div>
          <div class="card-body">
            <div class="usage-chart" id="usage-chart">
              ${hist.map(v => `<div class="bar-col" style="height:${(v/maxH*100).toFixed(0)}%;background:rgba(74,222,128,${(0.08+v/maxH*0.25).toFixed(2)});border-color:rgba(74,222,128,${(0.1+v/maxH*0.5).toFixed(2)})"></div>`).join("")}
            </div>
          </div>
        </div>
      `;

      startLive(d);
    }

    function startLive(d) {
      if (liveInterval) clearInterval(liveInterval);
      liveInterval = setInterval(() => {
        const dlEl = document.getElementById("dl-val");
        const ulEl = document.getElementById("ul-val");
        if (!dlEl) { clearInterval(liveInterval); return; }
        const newDl = Math.max(0, d.dl + (Math.random() - 0.45) * 2).toFixed(1);
        const newUl = Math.max(0, d.ul + (Math.random() - 0.45) * 0.5).toFixed(1);
        dlEl.textContent = newDl;
        ulEl.textContent = newUl;
        // shift chart
        const chart = document.getElementById("usage-chart");
        if (chart && chart.firstChild) {
          chart.removeChild(chart.firstChild);
          const bar = document.createElement("div");
          bar.className = "bar-col";
          const pct = Math.min(100, parseFloat(newDl) * 10);
          bar.style.cssText = `height:${pct}%;background:rgba(74,222,128,${(0.08+pct/100*0.25).toFixed(2)});border-color:rgba(74,222,128,${(0.1+pct/100*0.5).toFixed(2)})`;
          chart.appendChild(bar);
        }
      }, 1000);
    }

    function pingDevice(id) {
      const d = allDevices.find(x => x.id === id);
      const ms = Math.floor(5 + Math.random() * 40);
      alert(`🏓 Ping ${d.ip}\n\nReply from ${d.ip}: time=${ms}ms TTL=64\nReply from ${d.ip}: time=${ms+2}ms TTL=64\nReply from ${d.ip}: time=${ms-1}ms TTL=64\n\nAverage: ${ms}ms`);
    }

    function kickDevice(id) {
      const d = allDevices.find(x => x.id === id);
      if (confirm(`Kick "${d.name}" from network?\nDevice will be temporarily disconnected.`)) {
        d.status = "idle";
        d.dl = 0; d.ul = 0;
        renderList();
        renderDetail();
      }
    }

    function blockDevice(id) {
      const d = allDevices.find(x => x.id === id);
      if (confirm(`🚫 Block "${d.name}" permanently?\nIP: ${d.ip}\nMAC: ${d.mac}`)) {
        d.status = "blocked";
        d.signal = 0; d.dl = 0; d.ul = 0;
        renderList();
        renderDetail();
      }
    }

    function startScan() {
      const btn = document.getElementById("scan-btn");
      const icon = document.getElementById("scan-icon");
      btn.disabled = true;
      icon.style.display = "inline-block";
      icon.style.animation = "spin 1s linear infinite";

      // Animate devices appearing one by one
      allDevices = [];
      renderList();
      const fresh = generateDevices();
      let i = 0;
      const t = setInterval(() => {
        if (i >= fresh.length) {
          clearInterval(t);
          btn.disabled = false;
          icon.style.animation = "";
          return;
        }
        allDevices.push(fresh[i++]);
        renderList();
      }, 250);
    }

    // Add spin animation
    const style = document.createElement("style");
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);

    // Auto-scan on load
    startScan();
  </script>
</body>
</html>

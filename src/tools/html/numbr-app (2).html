<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Numbr</title>
<style>
/* ===== Numbr - responsive app shell ===== */
:root{
  --nb-bg:#ffffff;
  --nb-canvas:#fbfbfa;
  --nb-border:#ededec;
  --nb-border-strong:#e3e3e1;
  --nb-text:#37352f;
  --nb-faint:#b6b6b2;
  --nb-result:#9b9a97;
  --nb-num:#2f80ed;
  --nb-cur:#15997b;
  --nb-op:#9065d0;
  --nb-kw:#9065d0;
  --nb-sum:#d6457f;
  --nb-header:#37352f;
  --nb-var:#0b8aa6;
  --nb-desc:#6b6a66;
  --nb-accent:#2f80ed;
  --nb-scroll:#cfcfcc;
  --nb-scroll-h:#b4b4af;
  --nb-mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,"Roboto Mono",monospace;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --nb-bg:#1f1f1f;--nb-canvas:#191919;--nb-border:#2f2f2f;--nb-border-strong:#3a3a3a;
    --nb-text:#e9e9e7;--nb-faint:#5b5b58;--nb-result:#8c8c88;
    --nb-num:#6aa7f5;--nb-cur:#3bc9a3;--nb-op:#b794f0;--nb-kw:#b794f0;--nb-sum:#ef6aa0;
    --nb-header:#e9e9e7;--nb-var:#3fc0dd;--nb-desc:#9a998f;--nb-scroll:#454544;--nb-scroll-h:#5a5a58;
  }
}
:root[data-theme="dark"]{
  --nb-bg:#1f1f1f;--nb-canvas:#191919;--nb-border:#2f2f2f;--nb-border-strong:#3a3a3a;
  --nb-text:#e9e9e7;--nb-faint:#5b5b58;--nb-result:#8c8c88;
  --nb-num:#6aa7f5;--nb-cur:#3bc9a3;--nb-op:#b794f0;--nb-kw:#b794f0;--nb-sum:#ef6aa0;
  --nb-header:#e9e9e7;--nb-var:#3fc0dd;--nb-desc:#9a998f;--nb-scroll:#454544;--nb-scroll-h:#5a5a58;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--nb-canvas);color:var(--nb-text);
  font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden}

/* themed scrollbars everywhere */
*{scrollbar-width:thin;scrollbar-color:var(--nb-scroll) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--nb-scroll);border-radius:10px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:var(--nb-scroll-h);border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-corner{background:transparent}

.nb-app{display:flex;height:100vh;height:100dvh;width:100%;position:relative}

.nb-overlay{position:fixed;inset:0;background:rgba(15,15,15,.38);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:45}
.nb-overlay.show{opacity:1;pointer-events:auto}

.nb-iconbtn{flex:0 0 auto;width:32px;height:32px;display:grid;place-items:center;border:none;background:transparent;color:var(--nb-text);font-size:18px;border-radius:7px;cursor:pointer;padding:0}
.nb-iconbtn:hover{background:rgba(127,127,127,0.14)}
.nb-side-close{margin-left:auto;width:28px;height:28px;display:none;place-items:center;border:none;background:transparent;color:var(--nb-faint);font-size:15px;border-radius:6px;cursor:pointer;padding:0}
.nb-side-close:hover{background:rgba(127,127,127,0.14)}

/* sidebar */
.nb-side{width:248px;flex:0 0 248px;background:var(--nb-canvas);border-right:1px solid var(--nb-border);display:flex;flex-direction:column;padding:14px 10px;overflow:hidden;transition:flex-basis .24s ease,width .24s ease,transform .24s ease,padding .24s ease}
.nb-brand{display:flex;align-items:center;gap:9px;padding:8px 10px 14px;font-weight:700;font-size:16px;letter-spacing:-0.01em;white-space:nowrap}
.nb-logo{flex:0 0 auto;width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#2f80ed,#9065d0);display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
.nb-newbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:9px 12px;margin-bottom:12px;border:none;background:var(--nb-accent);color:#fff;font-size:14px;font-weight:600;border-radius:9px;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(47,128,237,.28);transition:filter .15s ease,transform .1s ease}
.nb-newbtn:hover{filter:brightness(1.06)}
.nb-newbtn:active{transform:scale(.98)}
.nb-seclabel{display:flex;align-items:center;gap:8px;padding:8px 12px 4px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--nb-faint);white-space:nowrap}
.nb-sort{margin-left:auto;border:none;background:transparent;color:var(--nb-faint);font-size:11px;font-weight:600;letter-spacing:.02em;text-transform:none;cursor:pointer;padding:2px 6px;border-radius:6px}
.nb-sort:hover{background:rgba(127,127,127,0.14);color:var(--nb-text)}
.nb-note{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--nb-text);white-space:nowrap}
.nb-note:hover{background:rgba(127,127,127,0.12)}
.nb-note.active{background:rgba(47,128,237,0.12);color:var(--nb-accent);font-weight:600}
.nb-note .ico{opacity:.7;flex:0 0 auto}
.nb-note .nm{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.nb-note-del{flex:0 0 auto;width:20px;height:20px;display:grid;place-items:center;border:none;background:transparent;color:var(--nb-faint);font-size:12px;border-radius:5px;cursor:pointer;opacity:0;transition:opacity .12s ease;padding:0}
.nb-note:hover .nb-note-del{opacity:1}
.nb-note-del:hover{background:rgba(214,69,127,.16);color:var(--nb-sum)}
.nb-side-foot{margin-top:auto;padding:10px 12px;font-size:12px;color:var(--nb-faint);white-space:nowrap}
.nb-app:not(.nb-sidebar-open) .nb-side{flex-basis:0;width:0;padding-left:0;padding-right:0;border-right-color:transparent}

/* sheet */
.nb-sheet{flex:1;min-width:0;padding:20px 22px;display:flex}
.nb-card{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--nb-bg);border:1px solid var(--nb-border-strong);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(15,15,15,.04),0 8px 24px rgba(15,15,15,.05)}
.nb-cardhead{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--nb-border)}
.nb-title{font-size:15px;font-weight:650;letter-spacing:-0.01em;border:none;background:transparent;color:var(--nb-text);outline:none;flex:1;min-width:0;padding:2px 0}
.nb-saved{flex:0 0 auto;font-size:12px;color:var(--nb-faint)}

.nb-editor{flex:1;min-height:0;display:flex}
.nb-codewrap{flex:1;min-width:0;position:relative}
.nb-pre,.nb-input{margin:0;border:0;font-family:var(--nb-mono);font-size:14.5px;line-height:28px;padding:20px 22px;white-space:pre;tab-size:2;letter-spacing:0}
.nb-pre{position:absolute;inset:0;overflow:hidden;pointer-events:none;color:var(--nb-text)}
.nb-input{position:absolute;inset:0;width:100%;height:100%;background:transparent;color:transparent;caret-color:var(--nb-accent);resize:none;outline:none;overflow:auto}
.nb-input::selection{background:rgba(47,128,237,.22)}
.nb-gutter{flex:0 0 230px;width:230px;border-left:1px solid var(--nb-border);background:var(--nb-canvas);overflow:hidden;padding:20px 20px 20px 12px}
.nb-gutter .row{height:28px;line-height:28px;font-family:var(--nb-mono);font-size:14.5px;color:var(--nb-result);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:5px;cursor:default}
.nb-gutter .row.has{cursor:pointer}
.nb-gutter .row.has:hover{background:rgba(47,128,237,.10);color:var(--nb-num)}

.t-num{color:var(--nb-num)}
.t-cur{color:var(--nb-cur)}
.t-op{color:var(--nb-op)}
.t-kw{color:var(--nb-kw)}
.t-sum{color:var(--nb-sum);font-weight:600}
.t-header{color:var(--nb-header);font-weight:700}
.t-var{color:var(--nb-var)}
.t-desc{color:var(--nb-desc)}

/* tips card */
.nb-tips{position:fixed;left:20px;bottom:20px;width:286px;max-width:calc(100vw - 40px);background:var(--nb-bg);border:1px solid var(--nb-border-strong);border-radius:12px;padding:16px 16px 12px;box-shadow:0 6px 24px rgba(15,15,15,.12);z-index:42}
.nb-tips.hidden{display:none}
.nb-tips-head{display:flex;align-items:center;margin-bottom:8px}
.nb-tips-head b{font-size:13px}
.nb-tips-next{margin-left:auto;color:var(--nb-accent);font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;padding:0}
.nb-tips-body{font-size:13.5px;line-height:1.5;color:var(--nb-text);min-height:38px}
.nb-tips-ex{margin-top:10px;display:flex;justify-content:space-between;gap:10px;background:var(--nb-canvas);border:1px solid var(--nb-border);border-radius:7px;padding:7px 10px;font-family:var(--nb-mono);font-size:12.5px}
.nb-tips-ex .res{color:var(--nb-result)}
.nb-tips-foot{display:flex;align-items:center;margin-top:11px;font-size:12px;color:var(--nb-faint)}
.nb-tips-foot .hide{color:var(--nb-accent);font-weight:600;cursor:pointer}
.nb-tips-foot .count{margin-left:auto}

/* FAB + menu */
.nb-fab{position:fixed;right:22px;bottom:22px;width:50px;height:50px;border-radius:50%;background:var(--nb-accent);color:#fff;border:none;cursor:pointer;font-size:22px;line-height:1;box-shadow:0 6px 18px rgba(47,128,237,.4);display:grid;place-items:center;z-index:44;transition:transform .15s ease,filter .15s ease}
.nb-fab:hover{filter:brightness(1.06);transform:translateY(-1px)}
.nb-fab:active{transform:scale(.94)}
.nb-menu{position:fixed;right:22px;bottom:84px;background:var(--nb-bg);border:1px solid var(--nb-border-strong);border-radius:12px;box-shadow:0 12px 36px rgba(15,15,15,.20);padding:7px;z-index:44;min-width:212px;opacity:0;transform:translateY(8px) scale(.97);transform-origin:bottom right;pointer-events:none;transition:opacity .16s ease,transform .16s ease}
.nb-menu.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.nb-menu-label{padding:6px 12px 8px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--nb-faint)}
.nb-menu-sep{height:1px;background:var(--nb-border);margin:6px 8px}
.nb-menu button{display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:none;background:transparent;color:var(--nb-text);font-size:14px;border-radius:8px;cursor:pointer;text-align:left;white-space:nowrap}
.nb-menu button:hover{background:rgba(127,127,127,0.12)}
.nb-menu button .mi{width:18px;text-align:center;flex:0 0 auto}

/* QR modal */
.nb-qr{position:fixed;inset:0;background:rgba(15,15,15,.5);display:none;align-items:center;justify-content:center;z-index:70;padding:20px}
.nb-qr.open{display:flex}
.nb-qr-card{background:var(--nb-bg);border:1px solid var(--nb-border-strong);border-radius:16px;padding:18px 20px 20px;width:340px;max-width:100%;box-shadow:0 20px 60px rgba(15,15,15,.3);text-align:center}
.nb-qr-head{display:flex;align-items:center;margin-bottom:4px}
.nb-qr-head b{font-size:15px}
.nb-qr-head .nb-iconbtn{margin-left:auto}
.nb-qr-sub{margin:0 0 14px;font-size:13px;color:var(--nb-faint);text-align:left}
.nb-qr-canvas{width:264px;height:264px;max-width:100%;background:#fff;border-radius:10px;border:1px solid var(--nb-border);image-rendering:pixelated;display:inline-block}
.nb-qr-url{margin:12px 0;font-family:var(--nb-mono);font-size:11px;color:var(--nb-faint);word-break:break-all;max-height:54px;overflow:auto;text-align:left}
.nb-qr-dl{width:100%;padding:10px;border:none;border-radius:9px;background:var(--nb-accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.nb-qr-dl:hover{filter:brightness(1.05)}

/* toast */
.nb-toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:#37352f;color:#fff;padding:10px 18px;border-radius:9px;font-size:14px;font-weight:550;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80;max-width:90vw;text-align:center}
.nb-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* tablet */
@media (max-width:900px){ .nb-gutter{flex-basis:190px;width:190px} }

/* mobile: sidebar drawer */
@media (max-width:760px){
  .nb-sheet{padding:10px}
  .nb-card{border-radius:10px}
  .nb-side{position:fixed;top:0;left:0;bottom:0;height:100vh;height:100dvh;width:80vw;max-width:300px;flex-basis:auto;z-index:50;transform:translateX(-100%);box-shadow:0 0 40px rgba(15,15,15,.18);padding:14px 12px}
  .nb-app.nb-sidebar-open .nb-side{transform:translateX(0)}
  .nb-app:not(.nb-sidebar-open) .nb-side{width:80vw;flex-basis:auto;padding:14px 12px}
  .nb-side-close{display:grid}
  .nb-gutter{flex-basis:118px;width:118px;padding:16px 12px 16px 8px}
  .nb-pre,.nb-input{padding:16px 16px;font-size:16px;line-height:28px}
  .nb-gutter .row{font-size:14px;height:28px;line-height:28px}
  .nb-tips{left:12px;right:12px;bottom:84px;width:auto}
}

@media (max-width:560px){
  .nb-tips{display:none}
  .nb-tips.force-show{display:block}
  .nb-fab{right:16px;bottom:16px}
  .nb-menu{right:16px;bottom:74px;left:16px;min-width:0}
}
</style>
</head>
<body>
<div class="nb-app nb-sidebar-open" id="nb-app">

	<div class="nb-overlay" id="nb-overlay"></div>

	<aside class="nb-side" id="nb-side">
		<div class="nb-brand">
			<span class="nb-logo">N</span> Numbr
			<button class="nb-side-close" id="nb-side-close" title="Close">✕</button>
		</div>
		<button class="nb-newbtn" id="nb-new">➕ New sheet</button>
		<div class="nb-seclabel"><span>Sheets</span><button class="nb-sort" id="nb-sort" title="Change sort order">Newest ▾</button></div>
		<div class="nb-sheets" id="nb-sheets"></div>
		<div class="nb-side-foot" id="nb-side-foot">Numbr · calculator + notepad</div>
	</aside>

	<main class="nb-sheet">
		<div class="nb-card">
			<div class="nb-cardhead">
				<button class="nb-iconbtn" id="nb-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
				<input class="nb-title" id="nb-title" value="Scratchpad" spellcheck="false" />
				<span class="nb-saved" id="nb-saved">Saved</span>
				<button class="nb-iconbtn" id="nb-theme" title="Theme">🌗</button>
			</div>
			<div class="nb-editor">
				<div class="nb-codewrap">
					<pre class="nb-pre" id="nb-pre" aria-hidden="true"></pre>
					<textarea class="nb-input" id="nb-input" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
				</div>

			</div>
		</div>
	</main>
</div>

<div class="nb-tips" id="nb-tips">
	<div class="nb-tips-head"><b>Tips &amp; Tricks</b><button class="nb-tips-next" id="nb-tip-next">Next →</button></div>
	<div class="nb-tips-body" id="nb-tip-body"></div>
	<div class="nb-tips-ex" id="nb-tip-ex"></div>
	<div class="nb-tips-foot"><span class="hide" id="nb-tip-hide">Hide</span><span class="count" id="nb-tip-count"></span></div>
</div>

<button class="nb-fab" id="nb-fab" title="Menu" aria-label="Menu">⋮</button>
<div class="nb-menu" id="nb-menu">
	<div class="nb-menu-label">This sheet</div>
	<button id="mn-share"><span class="mi">🔗</span> Copy share link</button>
	<button id="mn-qr"><span class="mi">📱</span> Get QR code</button>
	<button id="mn-duplicate"><span class="mi">⧉</span> Duplicate sheet</button>
	<button id="mn-css"><span class="mi">💕</span> Customize CSS…</button>
	<button id="mn-clear"><span class="mi">🧹</span> Clear sheet</button>
	<div class="nb-menu-sep"></div>
	<div class="nb-menu-label">App</div>
	<button id="mn-example"><span class="mi">✨</span> Load example</button>
	<button id="mn-rates"><span class="mi">🔄</span> Update rates</button>
	<button id="mn-numfmt"><span class="mi">🔢</span> <span id="mn-numfmt-l">Number format</span></button>
	<button id="mn-tips"><span class="mi">💡</span> Show tips</button>
</div>

<div class="nb-qr" id="nb-qr">
	<div class="nb-qr-card">
		<div class="nb-qr-head"><b>QR code</b><button class="nb-iconbtn" id="nb-qr-close" title="Close">✕</button></div>
		<p class="nb-qr-sub">Scan to open this exact sheet on another device.</p>
		<canvas id="nb-qr-canvas" class="nb-qr-canvas"></canvas>
		<div class="nb-qr-url" id="nb-qr-url"></div>
		<button class="nb-qr-dl" id="nb-qr-download">Download PNG</button>
	</div>
</div>

<div class="nb-toast" id="nb-toast"></div>
</body><script>
// ===== Numbr calculation engine =====
let RATES = {
  USD:1, EUR:1.09, GBP:1.27, JPY:0.0067, KRW:0.00073, RUB:0.011,
  CAD:0.73, CHF:1.13, AUD:0.66, CNY:0.14, INR:0.012, SGD:0.75, IDR:0.0000615,
  BTC:68000, ETH:3600, DOGE:0.16, XRP:0.60, ADA:0.45, SOL:170, LTC:85
};
function setRates(obj){ if(obj&&typeof obj==='object'){ for(const k in obj){ const v=obj[k]; if(typeof v==='number'&&isFinite(v)&&v>0) RATES[k.toUpperCase()]=v; } } }
function getRates(){ return Object.assign({}, RATES); }
let NUM_FMT='eu';
function setNumFmt(f){ if(f==='us'||f==='eu') NUM_FMT=f; }
function getNumFmt(){ return NUM_FMT; }
const SYMBOL_TO_CODE = {'$':'USD','\u20ac':'EUR','\u00a3':'GBP','\u00a5':'JPY','\u20a9':'KRW','\u20bd':'RUB'};
const CODE_TO_SYMBOL = {USD:'$',EUR:'\u20ac',GBP:'\u00a3',JPY:'\u00a5',KRW:'\u20a9',RUB:'\u20bd'};

function escapeReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function normalizeThousands(s){
  // European decimal with dot-thousands: 1.234,56 or 1.234.567,89 -> 1234.56 / 1234567.89
  s = s.replace(/\b\d{1,3}(?:\.\d{3})+,\d+\b/g, m => m.replace(/\./g,'').replace(',', '.'));
  // US thousands (comma) with optional decimal: 1,234,567.89 -> 1234567.89
  s = s.replace(/\b\d{1,3}(?:,\d{3})+(?:\.\d+)?\b/g, m => m.replace(/,/g,''));
  // Dot-thousands without decimal: 10.000 or 1.000.000 -> 10000 / 1000000
  s = s.replace(/\b\d{1,3}(?:\.\d{3})+(?!\d)/g, m => m.replace(/\./g,''));
  // Space thousands: 10 000 -> 10000
  s = s.replace(/\d{1,3}(?: \d{3})+(?!\d)/g, m => m.replace(/ /g,''));
  return s;
}

function tokenize(str){
  const tokens=[]; let i=0;
  while(i<str.length){
    const c=str[i];
    if(/\s/.test(c)){i++;continue;}
    if('+-*/^()'.indexOf(c)>=0){tokens.push({t:'op',v:c});i++;continue;}
    if(c==='%'){tokens.push({t:'percent'});i++;continue;}
    if(SYMBOL_TO_CODE[c]){tokens.push({t:'cursym',v:SYMBOL_TO_CODE[c]});i++;continue;}
    const numMatch=/^(\d+(?:\.\d+)?|\.\d+)/.exec(str.slice(i));
    if(numMatch){
      let num=parseFloat(numMatch[1]); i+=numMatch[0].length;
      const suf=/^([kKmM])(?![A-Za-z])/.exec(str.slice(i));
      if(suf){ if(suf[1]==='k'||suf[1]==='K') num*=1000; else num*=1000000; i+=1; }
      tokens.push({t:'num',v:num});
      continue;
    }
    const wordMatch=/^[A-Za-z]+/.exec(str.slice(i));
    if(wordMatch){tokens.push({t:'word',v:wordMatch[0]});i+=wordMatch[0].length;continue;}
    i++;
  }
  return tokens;
}

function classify(tokens){
  return tokens.map(tk=>{
    if(tk.t==='word'){
      const w=tk.v; const up=w.toUpperCase();
      if(w.length===1 && (w==='x'||w==='X')) return {t:'op',v:'*'};
      if(up==='IN'||up==='TO') return {t:'conv'};
      if(up==='OF') return {t:'of'};
      if(up==='SUM'||up==='TOTAL') return {t:'sumkw'};
      if(RATES[up]) return {t:'curword',v:up};
      return {t:'ignore'};
    }
    return tk;
  });
}

function buildTokens(str){
  str=normalizeThousands(str);
  let cls=classify(tokenize(str)).filter(t=>t.t!=='ignore');
  const out=[];
  for(let k=0;k<cls.length;k++){
    const tk=cls[k];
    if(tk.t==='cursym'){
      const nx=cls[k+1];
      if(nx&&nx.t==='num'&&nx.cur===undefined){ out.push({t:'num',v:nx.v,cur:tk.v}); k++; }

    }
    if(tk.t==='percent'){
      const nx=cls[k+1];

      if(nx&&nx.t==='num'){ out.push({t:'mod'}); }

function parseExpr(tokens){

    const t=peek();

    if(t&&t.t==='op'&&t.v==='-'){next();const e=parsePrimary(); if(!e)return null; return {value:-e.value,cur:e.cur,pct:e.pct};}
    if(t&&t.t==='op'&&t.v==='+'){next();const e=parsePrimary(); if(!e)return null; return {value:e.value,cur:e.cur,pct:e.pct};}
    if(t&&t.t==='num'){next();return {value:t.v,cur:t.cur,pct:t.pct};}

      } else if(t&&t.t==='mod'){next();const right=parsePower(); if(!right)break; left={value:left.value%right.value,cur:left.cur||right.cur};

  }

    let left=parseMulDiv(); if(!left)return null;
    while(true){const t=peek();
      if(t&&t.t==='op'&&(t.v==='+'||t.v==='-')){next();const right=parseMulDiv(); if(!right)break;

        }
      } else break;
    }
    return left;
  }

}

function finalizeVal(r){ if(!r)return null; if(r.pct) return {value:r.value/100,cur:r.cur}; return {value:r.value,cur:r.cur}; }

function evalExpr(str){
  const toks=buildTokens(str);
  if(toks.length===0) return null;
  const ci=toks.findIndex(t=>t.t==='conv');
  if(ci>=0){
    const left=toks.slice(0,ci);
    const rest=toks.slice(ci+1);
    let tcur=null;
    const cw=rest.find(t=>t.t==='curword'); if(cw)tcur=cw.v; else {const n=rest.find(t=>t.t==='num'&&t.cur); if(n)tcur=n.cur;}
    const lv=parseExpr(left);
    if(!lv) return null;
    if(!tcur||!RATES[tcur]) return finalizeVal(lv);
    const fromCur=lv.cur||'USD';
    if(!RATES[fromCur]) return finalizeVal(lv);
    const usd=lv.value*RATES[fromCur];
    return {value:usd/RATES[tcur],cur:tcur};
  }
  return finalizeVal(parseExpr(toks));
}

function substituteVars(str,vars){
  const names=Object.keys(vars).sort((a,b)=>b.length-a.length);
  let s=str; const usedCur=new Set();
  for(const n of names){
    const re=new RegExp('(?<![A-Za-z0-9])'+escapeReg(n)+'(?![A-Za-z0-9])','gi');
    if(re.test(s)){ if(vars[n].cur) usedCur.add(vars[n].cur); s=s.replace(new RegExp('(?<![A-Za-z0-9])'+escapeReg(n)+'(?![A-Za-z0-9])','gi'), '('+vars[n].value+')'); }
  }
  return {str:s, cur: usedCur.size===1?[...usedCur][0]:null};
}

function computeLines(text){
  const lines=text.split('\n');
  const vars={};
  const results=[];
  let lastHeader=-1;
  for(let idx=0;idx<lines.length;idx++){
    const line=lines[idx];
    const trimmed=line.trim();
    if(trimmed===''){ results.push({kind:'blank',display:''}); continue; }
    if(trimmed.charAt(0)==='#'){ results.push({kind:'header',display:''}); lastHeader=idx; continue; }
    const asg=/^([A-Za-z][A-Za-z0-9 ]*?)\s*=\s*(.+)$/.exec(line);
    if(asg){
      const name=asg[1].trim().toLowerCase();
      const sub=substituteVars(asg[2],vars);
      const res=evalExpr(sub.str);
      if(res){ if(res.cur===undefined&&sub.cur)res.cur=sub.cur; vars[name]={value:res.value,cur:res.cur}; }
      results.push({kind:'assign',display:res?fmt(res):'',value:res?res.value:null,cur:res?res.cur:null});
      continue;
    }
    if(/^(?:[^:]*:)?\s*(sum|total)\s*$/i.test(trimmed)){
      let s=0; let cur=null; let any=false;
      for(let j=lastHeader+1;j<idx;j++){
        const r=results[j];
        if(r&&(r.kind==='calc'||r.kind==='assign')&&typeof r.value==='number'&&!isNaN(r.value)){
          s+=r.value; any=true; if(!cur&&r.cur)cur=r.cur;
        }
      }
      results.push({kind:'sum',display:any?fmt({value:s,cur}):'',value:s,cur});
      continue;
    }
    let exprPart=line;
    const colonIdx=line.indexOf(':');
    if(colonIdx>=0) exprPart=line.slice(colonIdx+1);
    const sub=substituteVars(exprPart,vars);
    const res=evalExpr(sub.str);
    if(res&&res.cur===undefined&&sub.cur)res.cur=sub.cur;
    results.push({kind:'calc',display:res?fmt(res):'',value:res?res.value:null,cur:res?res.cur:null});
  }
  return results;
}

function formatNumber(v){
  if(!isFinite(v)) return '\u221e';
  const neg=v<0; const abs=Math.abs(v);
  let decimals = Number.isInteger(v)?0:(abs!==0&&abs<1?6:2);
  let fixed=abs.toFixed(decimals);
  let parts=fixed.split('.'); let intp=parts[0]; let frac=parts[1]||'';
  if(frac) frac=frac.replace(/0+$/,'');
  const thou = NUM_FMT==='eu'?'.':','; const dec = NUM_FMT==='eu'?',':'.';
  intp=intp.replace(/\B(?=(\d{3})+(?!\d))/g, thou);
  let out=intp+(frac?dec+frac:'');
  return (neg?'-':'')+out;
}
function fmt(res){
  if(!res||res.value===undefined||res.value===null||isNaN(res.value)) return '';
  const numStr=formatNumber(res.value);
  if(res.cur){ const sym=CODE_TO_SYMBOL[res.cur]; return sym?sym+numStr:numStr+' '+res.cur; }
  return numStr;
}

    const arr=sheets.slice();
    if(sortMode==='name') arr.sort((x,y)=>(x.name||'').toLowerCase().localeCompare((y.name||'').toLowerCase()));
    else if(sortMode==='old') arr.sort((x,y)=>(x.updatedAt||0)-(y.updatedAt||0));
    else arr.sort((x,y)=>(y.updatedAt||0)-(x.updatedAt||0));
    return arr;
  }
  function getActive(){ return sheets.find(s=>s.id===activeId) || sheets[0]; }

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function hlExpr(str){
    let out=''; let i=0;
    while(i<str.length){
      const c=str[i];
      if(/\s/.test(c)){ out+=c; i++; continue; }
      if('+-*/^=%'.indexOf(c)>=0){ out+='<span class="t-op">'+esc(c)+'</span>'; i++; continue; }
      if('()'.indexOf(c)>=0){ out+='<span class="t-op">'+c+'</span>'; i++; continue; }
      if('$\u20ac\u00a3\u00a5\u20a9\u20bd'.indexOf(c)>=0){ out+='<span class="t-cur">'+c+'</span>'; i++; continue; }
      const num=/^\d+(?:[.,]\d+)*[kKmM]?/.exec(str.slice(i));
      if(num){ out+='<span class="t-num">'+esc(num[0])+'</span>'; i+=num[0].length; continue; }
      const w=/^[A-Za-z]+/.exec(str.slice(i));
      if(w){ const word=w[0]; const up=word.toUpperCase(); let cls=null;
        if(up==='IN'||up==='TO'||up==='OF') cls='t-kw';
        else if(up==='TOTAL'||up==='SUM') cls='t-sum';
        else if(HL_CUR.has(up)) cls='t-cur';
        else if(word.length===1&&(word==='x'||word==='X')) cls='t-op';
        out += cls ? '<span class="'+cls+'">'+esc(word)+'</span>' : esc(word);
        i+=word.length; continue;
      }
      out+=esc(c); i++;
    }
    return out;
  }
  function highlightLine(line){
    if(line==='') return '';
    if(/^\s*#/.test(line)) return '<span class="t-header">'+esc(line)+'</span>';
    if(/^(?:[^:]*:)?\s*(sum|total)\s*$/i.test(line.trim())) return '<span class="t-sum">'+esc(line)+'</span>';
    const asg=/^([A-Za-z][A-Za-z0-9 ]*?)(\s*=\s*)([\s\S]+)$/.exec(line);
    if(asg) return '<span class="t-var">'+esc(asg[1])+'</span><span class="t-op">'+esc(asg[2])+'</span>'+hlExpr(asg[3]);
    const ci=line.indexOf(':');
    if(ci>=0) return '<span class="t-desc">'+esc(line.slice(0,ci+1))+'</span>'+hlExpr(line.slice(ci+1));
    return hlExpr(line);
  }

  // ---------- compression + share state ----------
  function b64urlEnc(bytes){ let s=''; for(let i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
  function b64urlDec(str){ str=str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4)str+='='; const bin=atob(str); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
  async function deflate(str){ const cs=new CompressionStream('deflate-raw'); const w=cs.writable.getWriter(); w.write(new TextEncoder().encode(str)); w.close(); const buf=await new Response(cs.readable).arrayBuffer(); return new Uint8Array(buf); }
  async function inflate(bytes){ const ds=new DecompressionStream('deflate-raw'); const w=ds.writable.getWriter(); w.write(bytes); w.close(); const buf=await new Response(ds.readable).arrayBuffer(); return new TextDecoder().decode(buf); }
  async function encodeState(state){
    const json=JSON.stringify(state);
    if('CompressionStream' in window){ try{ const bytes=await deflate(json); return 'c'+b64urlEnc(bytes); }catch(e){} }
    return 'b'+b64urlEnc(new TextEncoder().encode(json));
  }
  async function decodeState(hash){
    if(!hash) return null;
    const prefix=hash[0], body=hash.slice(1);
    try{
      let json;
      if(prefix==='c' && 'DecompressionStream' in window){ json=await inflate(b64urlDec(body)); }
      else if(prefix==='b'){ json=new TextDecoder().decode(b64urlDec(body)); }
      else { return { t: decodeURIComponent(escape(atob(decodeURIComponent(hash)))), s:'', n:'' }; }
      const obj=JSON.parse(json); return { t: obj.t||'', s: obj.s||'', n: obj.n||'' };
    }catch(e){ return null; }
  }

  function applyCustomCss(css){ const a=getActive(); if(a) a.css=css||''; let tag=$('nb-custom-style'); if(!tag){ tag=document.createElement('style'); tag.id='nb-custom-style'; document.head.appendChild(tag);} tag.textContent=css||''; }
  window.numbr = { setStyle:function(css){ applyCustomCss(css); persist(); }, getStyle:function(){ const a=getActive(); return a?a.css:''; } };

  // ---------- page title from leading # ----------
  function pageTitleFrom(text){
    const lines=text.split('\n');
    for(let i=0;i<lines.length;i++){ const t=lines[i].trim(); if(t==='')continue; const m=/^#{1,3}\s+(.+)/.exec(t); return m?m[1].trim():null; }
    return null;
  }
  function applyPageTitle(text){ const pt=pageTitleFrom(text); document.title = pt ? (pt+' \u2014 Numbr') : 'Numbr'; }

  // ---------- render editor ----------
  function render(){
    const text=input.value;
    const lines=text.split('\n');
    let html=lines.map(highlightLine).join('\n');
    if(text.endsWith('\n')) html+='\u200b';
    pre.innerHTML=html;
    const res=computeLines(text);
    let g='';
    for(let i=0;i<lines.length;i++){
      const d=res[i]?res[i].display:'';
      if(d) g+='<div class="row has" data-val="'+String(d).replace(/"/g,'&quot;')+'" title="Click to copy">'+d+'</div>';
      else g+='<div class="row">&nbsp;</div>';
    }
    gutter.innerHTML=g;
    applyPageTitle(text);
    sync();
  }
  function sync(){ pre.scrollTop=input.scrollTop; pre.scrollLeft=input.scrollLeft; gutter.scrollTop=input.scrollTop; }

  let toastT; function showToast(m){ toast.textContent=m; toast.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>toast.classList.remove('show'),1900); }

  // ---------- persistence ----------
  function persist(){
    const a=getActive(); if(a){ a.text=input.value; a.updatedAt=Date.now(); }
    try{ localStorage.setItem(STORE_KEY, JSON.stringify({sheets:sheets, activeId:activeId, sortMode:sortMode})); }catch(e){}
    clearTimeout(persist._u); persist._u=setTimeout(async function(){
      try{ const cur=getActive(); if(!cur)return; const h=await encodeState({t:cur.text, s:cur.css||'', n:cur.name||''}); history.replaceState(null,'','#'+h); }catch(e){}
    },300);
  }

  // ---------- sidebar rendering ----------
  function renderSheets(){
    const sortBtn=$('nb-sort'); if(sortBtn) sortBtn.textContent=SORT_LABEL[sortMode]+' \u25be';
    const foot=$('nb-side-foot'); if(foot) foot.textContent=sheets.length+' sheet'+(sheets.length>1?'s':'')+' \u00b7 Numbr';
    sheetBox.innerHTML='';
    sortedSheets().forEach(function(s){
      const row=document.createElement('div');
      row.className='nb-note'+(s.id===activeId?' active':'');
      row.setAttribute('data-id',s.id);
      const ic=document.createElement('span'); ic.className='ico'; ic.textContent=s.icon||'\ud83e\uddee';
      const nm=document.createElement('span'); nm.className='nm'; nm.textContent=s.name||'Untitled';
      const del=document.createElement('button'); del.className='nb-note-del'; del.title='Delete sheet'; del.textContent='\u2715';
      row.appendChild(ic); row.appendChild(nm); row.appendChild(del);
      row.addEventListener('click', function(e){ if(e.target===del) return; selectSheet(s.id); });
      del.addEventListener('click', function(e){ e.stopPropagation(); deleteSheet(s.id); });
      sheetBox.appendChild(row);
    });
  }

  function loadActive(){
    const a=getActive(); if(!a) return;
    input.value=a.text||'';
    title.value=a.name||'Untitled';
    let tag=$('nb-custom-style'); if(!tag){ tag=document.createElement('style'); tag.id='nb-custom-style'; document.head.appendChild(tag);} tag.textContent=a.css||'';
    render();
  }

  function selectSheet(id){
    if(id===activeId){ if(isMobile()) setSidebar(false); return; }
    const a=getActive(); if(a) a.text=input.value;
    activeId=id; loadActive(); renderSheets(); persist();
    if(isMobile()) setSidebar(false); else input.focus();
  }

  function newSheet(){
    const a=getActive(); if(a) a.text=input.value;
    const s={ id:uid(), name:'Untitled', icon:'\ud83d\udcc4', text:'', css:'', updatedAt:Date.now() };
    sheets.push(s); activeId=s.id;
    loadActive(); renderSheets(); persist();
    showToast('New sheet created');
    if(isMobile()) setSidebar(false);
    input.focus();
  }

  function duplicateSheet(){
    const a=getActive(); if(!a) return; a.text=input.value;
    const s={ id:uid(), name:(a.name||'Untitled')+' copy', icon:a.icon||'\ud83e\uddee', text:a.text, css:a.css||'', updatedAt:Date.now() };
    sheets.push(s); activeId=s.id;
    loadActive(); renderSheets(); persist();
    showToast('Sheet duplicated');
    if(isMobile()) setSidebar(false);
    input.focus();
  }

  function deleteSheet(id){
    const idx=sheets.findIndex(s=>s.id===id); if(idx<0) return;
    const wasActive=(id===activeId);
    sheets.splice(idx,1);
    if(sheets.length===0){ sheets.push({ id:uid(), name:'Scratchpad', icon:'\ud83e\uddee', text:'', css:'', updatedAt:Date.now() }); }
    if(wasActive){ activeId=sheets[Math.max(0,idx-1)].id; loadActive(); }
    renderSheets(); persist();
    showToast('Sheet deleted');
  }

  // ---------- input events ----------
  let saveT;
  input.addEventListener('input', function(){ render(); persist(); saved.textContent='Saving\u2026'; clearTimeout(saveT); saveT=setTimeout(()=>saved.textContent='Saved',600); });
  input.addEventListener('scroll', sync);
  input.addEventListener('keydown', function(e){
    if(e.key==='Tab'){ e.preventDefault(); const s=input.selectionStart,en=input.selectionEnd; input.value=input.value.slice(0,s)+'  '+input.value.slice(en); input.selectionStart=input.selectionEnd=s+2; render(); persist(); return; }
    if(e.altKey && e.key==='Enter'){
      e.preventDefault(); const pos=input.selectionStart; const before=input.value.slice(0,pos); const idx=before.split('\n').length-1;
      const res=computeLines(input.value); const val=res[idx]&&res[idx].display?res[idx].display:'';
      const ins='\n'+(val?'('+val+')':''); input.value=input.value.slice(0,pos)+ins+input.value.slice(pos);
      input.selectionStart=input.selectionEnd=pos+ins.length; render(); persist();
    }
  });
  gutter.addEventListener('click', function(e){ const row=e.target.closest('.row.has'); if(!row)return; const v=row.getAttribute('data-val'); if(navigator.clipboard)navigator.clipboard.writeText(v); showToast('Copied “'+v+'”'); });

  // rename active sheet via title input
  title.addEventListener('input', function(){ const a=getActive(); if(a){ a.name=title.value||'Untitled'; const row=sheetBox.querySelector('.nb-note[data-id="'+a.id+'"] .nm'); if(row) row.textContent=a.name; persist(); } });

  // ---------- menu ----------
  const fab=$('nb-fab');
  fab.addEventListener('click', function(e){ e.stopPropagation(); menu.classList.toggle('open'); });
  document.addEventListener('click', function(e){ if(!menu.contains(e.target)&&e.target!==fab) menu.classList.remove('open'); });
  async function buildShareUrl(){ const a=getActive(); const h=await encodeState({t:input.value, s:a?a.css||'':'', n:a?a.name||'':''}); return location.origin+location.pathname+'#'+h; }
  $('mn-share').addEventListener('click', async function(){ const url=await buildShareUrl(); history.replaceState(null,'',url); if(navigator.clipboard){ await navigator.clipboard.writeText(url); showToast('Share link copied'); } else showToast('Link updated in address bar'); menu.classList.remove('open'); });
  $('mn-example').addEventListener('click', function(){ input.value=DEFAULT_TEXT; render(); persist(); menu.classList.remove('open'); input.focus(); });
  $('mn-clear').addEventListener('click', function(){ input.value=''; render(); persist(); menu.classList.remove('open'); input.focus(); });
  $('mn-css').addEventListener('click', function(){ menu.classList.remove('open'); const a=getActive(); const css=prompt('Custom CSS (saved in the link). Example: .nb-card{ --nb-accent:#e0457b; }', (a&&a.css)||''); if(css!==null){ applyCustomCss(css); persist(); showToast(css?'Custom style applied':'Custom style cleared'); } });
  $('mn-tips').addEventListener('click', function(){ const t=$('nb-tips'); t.classList.remove('hidden'); t.classList.add('force-show'); menu.classList.remove('open'); });
  $('mn-duplicate').addEventListener('click', function(){ duplicateSheet(); menu.classList.remove('open'); });

  // ---------- live exchange rates ----------
  const RATES_KEY='numbr:rates:v1';
  const CRYPTO_IDS={bitcoin:'BTC',ethereum:'ETH',dogecoin:'DOGE',ripple:'XRP',cardano:'ADA',solana:'SOL',litecoin:'LTC'};
  const FIAT_CODES=['EUR','GBP','JPY','KRW','RUB','CAD','CHF','AUD','CNY','INR','SGD','IDR'];
  async function updateRates(silent){
    if(typeof setRates!=='function') return false;
    let updated=false;
    const tasks=[];
    tasks.push(fetch('https://open.er-api.com/v6/latest/USD').then(r=>r.json()).then(d=>{
      if(d&&d.rates){ const fiat={USD:1}; FIAT_CODES.forEach(c=>{ if(d.rates[c]>0) fiat[c]=1/d.rates[c]; }); setRates(fiat); updated=true; }
    }).catch(()=>{}));
    tasks.push(fetch('https://api.coingecko.com/api/v3/simple/price?ids='+Object.keys(CRYPTO_IDS).join(',')+'&vs_currencies=usd').then(r=>r.json()).then(d=>{
      const cr={}; for(const id in CRYPTO_IDS){ if(d[id]&&d[id].usd>0) cr[CRYPTO_IDS[id]]=d[id].usd; } if(Object.keys(cr).length){ setRates(cr); updated=true; }
    }).catch(()=>{}));
    await Promise.allSettled(tasks);
    if(updated){ try{ localStorage.setItem(RATES_KEY, JSON.stringify({rates:getRates(), at:Date.now()})); }catch(e){} render(); if(!silent) showToast('Rates updated \u00b7 just now'); }
    else if(!silent){ showToast('Could not update rates (offline?)'); }
    return updated;
  }
  $('mn-rates').addEventListener('click', function(){ menu.classList.remove('open'); showToast('Updating rates\u2026'); updateRates(false); });

  // ---------- theme ----------
  const THEME_KEY='numbr:theme'; let theme='auto';
  const THEME_ICON={auto:'\ud83c\udf17',light:'\u2600\ufe0f',dark:'\ud83c\udf19'};
  function applyTheme(){ const r=document.documentElement; if(theme==='auto') r.removeAttribute('data-theme'); else r.setAttribute('data-theme',theme); const b=$('nb-theme'); if(b){ b.textContent=THEME_ICON[theme]; b.title='Theme: '+theme.charAt(0).toUpperCase()+theme.slice(1); } }
  try{ const tv=localStorage.getItem(THEME_KEY); if(tv) theme=tv; }catch(e){}
  $('nb-theme').addEventListener('click', function(){ theme = theme==='auto'?'light':(theme==='light'?'dark':'auto'); try{ localStorage.setItem(THEME_KEY,theme); }catch(e){} applyTheme(); showToast('Theme: '+theme.charAt(0).toUpperCase()+theme.slice(1)); });
  applyTheme();

  // ---------- number format ----------
  const NUMFMT_KEY='numbr:numfmt'; let numFmt='eu';
  const NUMFMT_EX={us:'1,234.56',eu:'1.234,56'};
  function applyNumFmt(){ if(typeof setNumFmt==='function') setNumFmt(numFmt); const l=$('mn-numfmt-l'); if(l) l.textContent='Number format: '+NUMFMT_EX[numFmt]; }
  try{ const nv=localStorage.getItem(NUMFMT_KEY); if(nv==='us'||nv==='eu') numFmt=nv; }catch(e){}
  $('mn-numfmt').addEventListener('click', function(){ numFmt = numFmt==='eu'?'us':'eu'; try{ localStorage.setItem(NUMFMT_KEY,numFmt); }catch(e){} applyNumFmt(); render(); showToast('Number format: '+NUMFMT_EX[numFmt]); menu.classList.remove('open'); });
  applyNumFmt();

  // ---------- QR ----------
  const qrModal=$('nb-qr'), qrCanvas=$('nb-qr-canvas'), qrUrl=$('nb-qr-url');
  function drawQr(url){
    const m = (typeof QRCodeLib!=='undefined') ? QRCodeLib.make(url) : null;
    if(!m){ showToast('Note is too long for a QR code'); return false; }
    const size=m.length, quiet=4, scale=Math.max(4, Math.floor(280/(size+quiet*2)));
    const px=(size+quiet*2)*scale;
    qrCanvas.width=px; qrCanvas.height=px;
    const ctx=qrCanvas.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,px,px);
    ctx.fillStyle='#000000';
    for(let r=0;r<size;r++) for(let c=0;c<size;c++) if(m[r][c]) ctx.fillRect((c+quiet)*scale,(r+quiet)*scale,scale,scale);
    return true;
  }
  $('mn-qr').addEventListener('click', async function(){ menu.classList.remove('open'); const url=await buildShareUrl(); history.replaceState(null,'',url); if(drawQr(url)){ qrUrl.textContent=url; qrModal.classList.add('open'); } });
  $('nb-qr-close').addEventListener('click', ()=>qrModal.classList.remove('open'));
  qrModal.addEventListener('click', function(e){ if(e.target===qrModal) qrModal.classList.remove('open'); });
  $('nb-qr-download').addEventListener('click', function(){ const a=document.createElement('a'); a.href=qrCanvas.toDataURL('image/png'); a.download='numbr-qr.png'; a.click(); });

  // ---------- tips ----------
  const TIPS=[
    {b:'Words around and between calculations are ignored. Use it to add meaningful context.',in:'Price $300 / per 3 person',res:'$100'},
    {b:'Variable names can contain spaces and even numbers.',in:'iPhone 12 price = $1200',res:'$1,200'},
    {b:'Start a line with # for a header, then use Total or Sum to add everything up to it.',in:'Total',res:'$11'},
    {b:'Use k for thousands and M for millions — spaces and commas work too.',in:'1.5k + 0.5M',res:'501,500'},
    {b:'Convert currencies and crypto with “in”. Rates are built in so it works offline.',in:'1 BTC in ETH',res:'18.57 ETH'},
    {b:'Each sheet is saved in your browser and compressed into the link — share it or get a QR code.',in:'🔗 / 📱 menu',res:''},
    {b:'Start the document with “# Title” to rename the browser tab. Tweak the look with Custom CSS.',in:'# My budget',res:''}
  ];
  let tip=0; const tipBody=$('nb-tip-body'), tipEx=$('nb-tip-ex'), tipCount=$('nb-tip-count');
  function renderTip(){ const t=TIPS[tip]; tipBody.textContent=t.b; if(t.in){ tipEx.style.display='flex'; tipEx.innerHTML='<span>'+esc(t.in)+'</span><span class="res">'+esc(t.res)+'</span>'; } else tipEx.style.display='none'; tipCount.textContent=(tip+1)+' of '+TIPS.length; }
  $('nb-tip-next').addEventListener('click', function(){ tip=(tip+1)%TIPS.length; renderTip(); });
  $('nb-tip-hide').addEventListener('click', function(){ $('nb-tips').classList.add('hidden'); });
  renderTip();

  // ---------- sidebar toggle (responsive) ----------
  const app=$('nb-app'), overlay=$('nb-overlay');
  function isMobile(){ return window.matchMedia('(max-width:760px)').matches; }
  function setSidebar(open){ app.classList.toggle('nb-sidebar-open',open); overlay.classList.toggle('show',open&&isMobile()); }
  $('nb-toggle').addEventListener('click', ()=>setSidebar(!app.classList.contains('nb-sidebar-open')));
  $('nb-side-close').addEventListener('click', ()=>setSidebar(false));
  overlay.addEventListener('click', ()=>setSidebar(false));
  $('nb-new').addEventListener('click', newSheet);
  $('nb-sort').addEventListener('click', function(){ sortMode = sortMode==='new'?'old':(sortMode==='old'?'name':'new'); renderSheets(); persist(); });
  let rzT; window.addEventListener('resize', function(){ clearTimeout(rzT); rzT=setTimeout(function(){ if(isMobile()) setSidebar(false); else { app.classList.add('nb-sidebar-open'); overlay.classList.remove('show'); } },150); });

  // ---------- init (async load) ----------
  (async function init(){
    let loaded=null;
    try{ const raw=localStorage.getItem(STORE_KEY); if(raw){ const o=JSON.parse(raw); if(o&&Array.isArray(o.sheets)&&o.sheets.length){ loaded=o; } } }catch(e){}
    if(loaded){ const base=Date.now(); sheets=loaded.sheets.map((s,i)=>({id:s.id||uid(), name:s.name||'Untitled', icon:s.icon||'\ud83e\uddee', text:s.text||'', css:s.css||'', updatedAt:s.updatedAt||(base+i)})); activeId=loaded.activeId&&sheets.some(s=>s.id===loaded.activeId)?loaded.activeId:sheets[0].id; if(loaded.sortMode&&SORT_LABEL[loaded.sortMode]) sortMode=loaded.sortMode; }
    else { sheets=[{ id:uid(), name:'Scratchpad', icon:'\ud83e\uddee', text:DEFAULT_TEXT, css:'', updatedAt:Date.now() }]; activeId=sheets[0].id; }

    // load cached exchange rates, then refresh in the background if stale
    let ratesCache=null;
    try{ const rc=localStorage.getItem(RATES_KEY); if(rc){ ratesCache=JSON.parse(rc); if(ratesCache&&ratesCache.rates&&typeof setRates==='function') setRates(ratesCache.rates); } }catch(e){}
    if(!ratesCache || (Date.now()-(ratesCache.at||0) > 6*3600*1000)){ updateRates(true); }

    // shared link overrides the active sheet's content
    if(location.hash.length>1){ const st=await decodeState(location.hash.slice(1)); if(st){ const a=getActive(); a.text=st.t; a.css=st.s||''; if(st.n) a.name=st.n; } }

    setSidebar(!isMobile());
    renderSheets(); loadActive();
    if(!isMobile()) input.focus();
  })();
})();
</script>
</html>
